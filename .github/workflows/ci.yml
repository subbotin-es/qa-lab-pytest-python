name: QA Lab — Pytest + Python + Allure

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'   # Monday 09:00 UTC
  workflow_dispatch:

jobs:
  test:
    name: Run Pytest Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Type check
        run: mypy tests/ pages/ data/ --ignore-missing-imports

      - name: Lint
        run: ruff check .

      - name: Run smoke tests
        run: pytest -m smoke -n 4 --dist=loadfile
        env:
          BASE_URL: https://subbotin.es

      - name: Run full regression
        if: github.ref == 'refs/heads/main'
        run: pytest -n 4 --dist=loadfile
        env:
          BASE_URL: https://subbotin.es

      - name: Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate allure-results --clean -o allure-report

      - name: Upload Allure artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-python
          path: allure-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure

  performance:
    name: Locust SLO Check
    runs-on: ubuntu-latest
    needs: test          # run after pytest passes
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Locust smoke test (headless)
        run: |
          locust \
            -f performance/locust/locustfiles/slo_smoke.py \
            --headless \
            -u 5 -r 1 \
            -t 30s \
            --html performance/locust/smoke-report.html \
            --host https://subbotin.es \
            --exit-code-on-error 1
        env:
          BASE_URL: https://subbotin.es

      - name: Run Locust baseline test (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          locust \
            -f performance/locust/locustfiles/slo_baseline.py \
            --headless \
            -u 10 -r 2 \
            -t 60s \
            --html performance/locust/baseline-report.html \
            --host https://subbotin.es \
            --exit-code-on-error 1

      - name: Upload Locust HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-reports
          path: performance/locust/*.html
          retention-days: 14
