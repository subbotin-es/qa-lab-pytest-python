[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ANN"]
ignore = ["ANN101", "ANN102"]

[tool.mypy]
strict = true
python_version = "3.12"
ignore_missing_imports = false

[[tool.mypy.overrides]]
module = ["locust", "locust.*"]
ignore_missing_imports = true
ignore_errors = true

[[tool.mypy.overrides]]
# Locust 2.28 ships incomplete stubs: HttpClient overrides requests.Session
# with catch_response/name kwargs and adds .success()/.failure() to the
# response context manager — none of which appear in mypy's view of the types.
module = ["performance.locust.locustfiles.*"]
ignore_errors = true
